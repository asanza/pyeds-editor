name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Triggers when you push a tag like 'v1.0.1'
  release:
    types: [published]
  # Allows you to manually trigger the workflow from the Actions tab in GitHub
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyeds-editor
    permissions:
      id-token: write  # IMPORTANT: mandatory for PyPI Trusted Publishing
      contents: read
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build
        
      - name: Build a binary wheel and a source tarball
        run: python -m build
        
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
